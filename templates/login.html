<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CineArtistry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar stylish-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-icon-container">
                    <i class="fas fa-film"></i>
                </div>
                <span>CineArtistry</span>
            </div>
            <div class="nav-buttons">
                <a href="/" class="nav-link">Home</a>
                <a href="/login" class="nav-link active">Login</a>
                <a href="/signup" class="nav-btn-glow">Join Now</a>
            </div>
        </div>
    </nav>

    <div class="auth-full-screen">
        <div class="auth-glass-box">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your cinematic universe</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="glass-toast {{ category }}">
                <i
                    class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST" id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" placeholder="Enter your credentials" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn-premium">SIGN IN</button>
            </form>

            <div class="auth-footer">
                <p>New to CineArtistry? <a href="/signup">Create an account</a></p>
            </div>
        </div>
    </div>
</body>

</html>
