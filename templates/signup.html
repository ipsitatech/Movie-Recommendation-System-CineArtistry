<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join CineArtistry - Create Your Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar stylish-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo-icon-container">
                    <i class="fas fa-film"></i>
                </div>
                <span>CineArtistry</span>
            </div>
            <div class="nav-buttons">
                <a href="/" class="nav-link">Home</a>
                <a href="/login" class="nav-link">Login</a>
                <a href="/signup" class="nav-btn-glow">Join Now</a>
            </div>
        </div>
    </nav>

    <div class="auth-full-screen">
        <div class="auth-glass-box">
            <h2>Join the Circle</h2>
            <p class="auth-subtitle">Begin your cinematic journey today</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="glass-toast {{ category }}">
                <i
                    class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/signup" method="POST" id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Pick a unique name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 characters" required
                        minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password"
                        required>
                </div>
                <button type="submit" class="auth-btn-premium">CREATE ACCOUNT</button>
            </form>

            <div class="auth-footer">
                <p>Already a member? <a href="/login">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
